name: kooraspot
description: "KooraSpot - Your Ultimate Football Hub"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Routing
  go_router: ^15.1.2

  # Networking
  dio: ^5.8.0+1

  # Dependency Injection
  get_it: ^8.0.3

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8

  # Utils
  image_picker: ^1.1.2
  intl: ^0.20.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  image_path: "assets/images/icons/kooraspot.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/icons/
